services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env.docker
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    restart: always

  redis:
    image: redis:7-alpine
    restart: always

  web:
    build: .
    command: gunicorn ihms.wsgi:application --bind 0.0.0.0:8000 --workers 3
    volumes:
      - static_volume:/app/staticfiles
    expose:
      - 8000
    env_file:
      - .env.docker
    depends_on:
      - db
      - redis
    restart: always

  celery:
    build: .
    command: celery -A ihms worker --loglevel=info --concurrency=2
    env_file:
      - .env.docker
    depends_on:
      - db
      - redis
    restart: always

  celery-beat:
    build: .
    command: celery -A ihms beat --loglevel=info
    env_file:
      - .env.docker
    depends_on:
      - db
      - redis
    restart: always

  nginx:
    image: nginx:alpine
    volumes:
      - static_volume:/app/staticfiles
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - web
    restart: always

volumes:
  postgres_data:
  static_volume: