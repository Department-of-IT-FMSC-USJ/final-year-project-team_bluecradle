{% extends 'core_module/base_fallback.html' %}

{% block fallback_content %}
<div class="relative w-full max-w-2xl px-6 md:px-12 py-16 flex flex-col items-center text-center">
<!-- Abstract Background Glow for Depth -->
<div class="absolute inset-0 -z-10 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-surface-container-low via-surface to-surface opacity-80 pointer-events-none"></div>
<!-- 500 Indicator -->
<div class="relative mb-8">
<span class="font-display font-extrabold text-[8rem] leading-none tracking-tighter text-surface-container-highest select-none">
                500
            </span>
<div class="absolute inset-0 flex items-center justify-center mix-blend-multiply">
<span class="material-symbols-outlined text-[6rem] text-primary" data-icon="dns" style="font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 48;">dns</span>
</div>
<!-- Warning Badge Overlay -->
<div class="absolute bottom-4 -right-4 bg-error-container rounded-full p-2 shadow-[0_4px_24px_rgba(23,28,31,0.08)] flex items-center justify-center">
<span class="material-symbols-outlined text-error text-2xl" data-icon="error" style="font-variation-settings: 'FILL' 1;">error</span>
</div>
</div>
<!-- Text Content -->
<h1 class="font-headline font-bold text-3xl md:text-4xl text-primary mb-4 tracking-tight">
            Internal Server Error
        </h1>
<p class="font-body text-base md:text-lg text-on-surface-variant max-w-md mx-auto mb-10 leading-relaxed">
            Something went wrong on our end while processing clinical data. Our technical team has been notified and is investigating the issue.
        </p>
<!-- Action Buttons -->
<div class="flex flex-col sm:flex-row items-center justify-center gap-4 w-full sm:w-auto">
<!-- Primary Button (Gradient) -->
<button class="w-full sm:w-auto bg-gradient-to-br from-primary to-primary-container text-on-primary font-label font-medium text-base px-8 py-3.5 rounded-xl hover:shadow-[0_4px_24px_rgba(0,36,68,0.2)] hover:-translate-y-0.5 transition-all duration-200 flex items-center justify-center gap-2" onclick="window.location.reload()">
<span class="material-symbols-outlined text-[1.25rem]" data-icon="refresh">refresh</span>
                Retry Connection
            </button>
</div>
<!-- Diagnostic Info (Subtle) -->
<div class="mt-12 text-xs font-label text-outline/60 flex items-center gap-2">
<span>ERR_CODE: CLIN_500_INT</span>
<span class="w-1 h-1 rounded-full bg-outline/30"></span>
<span id="timestamp"></span>
</div>
</div>
<script>
        // Set current timestamp for clinical log feel
        document.getElementById('timestamp').textContent = new Date().toISOString();
    </script>
{% endblock %}
